  <!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
  <meta charset="UTF-8">
  <title>Detail</title>
</head>
<body>

  <!-- HEADER -->
    <header class="w-screen flex justify-between p-6 items-center
                  md:px-10 md:pt-[30px] md:pb-6 
                  xxl:p-10">
    <img src="/public/assets/shared/logo.svg" alt="Galleria title">
    <a class="font-normal tracking-[2px] text-[9px] md:text-[12px] md:leading-[2.5px]" 
    href="/index.html">STOP SLIDESHOW</a>
    
  </header>

  <main class="relative h-screen">
  <hr>
    <!-- КОНТЕНТ КАРТИНЫ -->
<div id="detail" class=" flex flex-col px-6 pt-6 pb-[77px]
                        md:px-10 md:pt-10 md:pb-14
                        xxl:pt-24 xxl:pb-20 xxl:flex-row"></div>
    
<div class="w-full h-[2px] bg-gray-300">
  <div id="progress" class="h-full bg-black transition-all duration-300"></div>
</div>

    <!-- КНОПКИ -->
     <footer id="footer" class="flex justify-between px-6 py-4 
                                
                                md:px=10 md:py-6"> 
            <div class="flex flex-col text-black">

                <h2 id="title" class="text-3.5 leading-[2] tracking-[-0.25px]
                                      md:text-[18px]  md:leading-[1.25] md:tracking-0
                                              
                "></h2>
                <p id="artist" class="text-2.5 leading-[1.2] font-normal
                                       opacity-75 mix-blend-normal
                                      md:text-[13px]  md:leading-[1.25] 
                                              
                "></p>
                       </div>
  
           <div class=" flex gap-4">
      <button id="prev" class="text-2xl">    
        <img 
      src="/public/assets/shared/icon-back-button.svg" 
      alt="Previous"
      class="w-6 h-6 opacity-70 group-hover:opacity-100 transition"
    >
</button>
      <button id="next" class="text-2xl"><img 
      src="/public/assets/shared/icon-next-button.svg" 
      alt="Next"
      class="w-6 h-6 opacity-70 group-hover:opacity-100 transition"
    >
</button>
           </div> 
</footer>
  </main>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
    
    <div class="relative max-w-[90%] max-h-[90%]">
      
      <button id="closeModal" class="absolute top-4 right-4 text-white text-xl">
        CLOSE
      </button>

      <img 
        id="modalImg"
        class="w-full h-auto object-contain"
        src=""
        alt=""
      >
      
    </div>

  </div>
 <script type="module" src="/src/detail.js" ></script>
</body> 
</html>
